<!DOCTYPE html>
<html>
<head>
<title>Background Image Experiment</title>

<style>
body {
  margin: 0;
  height: 200vh; /* extra height to allow scrolling */
}

/* container to hold the background image */
.bg-image {
  height: 100vh;

  /* beautiful nature image */
  background-image: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");

  background-size: cover;
  background-repeat: no-repeat;

  /* place image halfway down */
  background-position: center 50%;

  /* image stays fixed while scrolling */
  background-attachment: fixed;

  /* tilt horizontally */
  transform: rotateY(15deg);
}

h1 {
  text-align: center;
  padding-top: 40px;
}
</style>

</head>

<body>
<h1>Assalam Walaikum Everyone<h1>
<h1>Allah's Beauty and Grace</h1>
<p style="text-align:center;">  These place makes our mind peaceful </p>
<div class="bg-image"></div>

<p style="text-align:center;">so we need to save our god's beauty for our future</p>

</body>
</html>
