<!DOCTYPE html>
<html>
<head>
    <title>College Notice Board</title>

    <style>
        body {
            background-color: #f9f9f9;
            font-family: Arial, sans-serif;
        }

        .notice-board {
            width: 60%;
            margin: 40px auto;
            padding: 20px;
            background-color: white;
            border: 2px solid black;
        }

        h1 {
            text-align: center;              /* Text-alignment */
            text-transform: uppercase;       /* Text-transformation */
            text-decoration: underline;      /* Text-decoration */
            font-size: 28px;                 /* font-size */
        }

        .important {
            font-weight: bold;               /* Font-weight */
            font-size: 18px;                 /* font-size */
        }

        .date {
            font-style: italic;              /* Font-style */
            text-align: right;               /* Text-alignment */
        }

        .instructions {
            text-transform: capitalize;      /* Text-transformation */
        }
    </style>
</head>

<body>

    <div class="notice-board">
        <h1>College Fest Celebration</h1>

        <p class="important">
            All students are informed that our College Fest will be celebrated this December last week.
        </p>

        <p class="instructions">
            students must wear their own id card for identification and maintain your badge that is given in the entry of the college    
        </p>

        <p class="date">
            Date: from 21-12-2026 to 23-12-2026
        </p>
    </div>

</body>
</html>
