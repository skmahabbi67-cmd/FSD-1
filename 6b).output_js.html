<!DOCTYPE html>
<html>
<head>
<title>Display Output Methods</title>
</head>

<body>

<h2>Student Marks Information</h2>

<p id="marks"></p>

<script>

// innerHTML
document.getElementById("marks").innerHTML = 
"Your Operating System marks are: 85";

// document.write
document.write("<br>Your Java marks are: 94");

// alert
alert("Your assignment is due tomorrow!");

// console
console.log("Student logged into the portal");

</script>

</body>
</html>
