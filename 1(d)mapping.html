<!DOCTYPE html>
<html>
  <head>
	<title>Object-Based Coordinate</title>
  </head>
  <body>
	<h2>Interactive Image</h2>
	<h3>Click two faces on the image</h3>
	<p>The image is split into 2 clickable zones at pillars</p>
	  <img src="https://imgbb.com/"><img src="https://i.ibb.co/Dfb4zKdP/OIP-1.jpg" usemap="#objectmap" alt="Interactive Objects" width="900" height="500">
	<map name="objectmap">
	  <area shape="rect"
	    coords="100,80,280,280"
	    href="https://i.ibb.co/p87FmfG/maxresdefault.jpg"target="_blank"
	    alt="Part 1"
	    title="Click for Image 1">
	  <area shape="rect"
	    coords="580,50,880,480"
	    href="https://i.ibb.co/409jFLd/OIP-2.jpg"target="_blank"
	    alt="Part 2"
	    title="Click for Image 2">
	</map>

  </body>
</html>
