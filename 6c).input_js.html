<!DOCTYPE html>
<html>
<head>
<title>Input Example</title>
</head>

<body>

<h2>Student Course Registration</h2>

Enter Your Name:
<input type="text" id="name">
<br><br>

<button onclick="show()">Submit</button>

<p id="result"></p>

<script>

function show(){
    var studentName = document.getElementById("name").value;
    document.getElementById("result").innerHTML =
    "Welcome " + studentName + " to JAVA course";
}

// prompt input
var course = prompt("Enter your favorite subject:");
console.log("Favorite subject is: " + course);

</script>

</body>
</html>
