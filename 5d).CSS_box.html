<!DOCTYPE html>
<html>
<head>
    <title>Item Progress - CSS Box Model</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .Item {
            width: 400px;                 /* Content width */
            background-color: white;      /* Content background */
            
            padding: 150px;                /* Space inside the box */
            border: 10px solid #333;       /* Border around content */
            margin: 100px auto;            /* Space outside the box */
            
            text-align: center;
        }

        .Item h3 {
            margin: 15px 0;
        }

        .price {
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

    <div class="Item">
        <h3>Bluetooth Smart Watch</h3>
        <p>High quality Display </p>
        <p>More Advanced Features as present in Android phone such as listening to music, calling anyone, playing games...etc;</p>
        <p>Easy to carry and Easily chargable</p>
        <p class="price">Price: ₹999</p>
    </div>

</body>
</html>
